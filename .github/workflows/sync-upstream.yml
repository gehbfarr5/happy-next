name: Sync Fork with Upstream

on:
  schedule:
    - cron: '0 2 * * *'  # 每天 UTC 02:00 自动同步
  workflow_dispatch:      # 支持手动触发

jobs:
  sync:
    name: Sync branches with hitosea/happy-next
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      matrix:
        branch: [main, dev, next]
      fail-fast: false

    steps:
      - name: Sync ${{ matrix.branch }} with upstream
        id: sync
        run: |
          RESPONSE=$(curl -s -o /tmp/sync_response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/merge-upstream" \
            -d "{\"branch\":\"${{ matrix.branch }}\"}")
          echo "HTTP status: $RESPONSE"
          cat /tmp/sync_response.json
          if [ "$RESPONSE" = "200" ]; then
            echo "status=synced" >> $GITHUB_OUTPUT
          elif [ "$RESPONSE" = "409" ]; then
            echo "status=conflict" >> $GITHUB_OUTPUT
            echo "::warning::Branch ${{ matrix.branch }} has conflicts with upstream, manual merge required"
          else
            MSG=$(cat /tmp/sync_response.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('message','unknown'))")
            echo "::notice::Branch ${{ matrix.branch }}: $MSG"
          fi

      - name: Send Telegram notification on conflict
        if: steps.sync.outputs.status == 'conflict'
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="⚠️ *[Happy-Next] 上游同步冲突*%0A%0A分支 \`${{ matrix.branch }}\` 与上游产生冲突，需要手动处理。%0A%0A🔗 [查看仓库](https://github.com/${{ github.repository }})"
