name: Build APK (local notification)

on:
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/happy-app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: yarn install --frozen-lockfile
        working-directory: .

      - name: Expo prebuild (Android)
        run: npx expo prebuild --platform android --clean
        env:
          APP_ENV: preview

      - name: Generate signing keystore
        run: |
          keytool -genkeypair -v \
            -keystore signing.keystore \
            -alias happynext \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass happynext123 \
            -keypass happynext123 \
            -dname "CN=Happy Next,O=Happy Next,C=CN"

      - name: Disable lint for CI
        run: |
          mkdir -p ~/.gradle/init.d
          cat > ~/.gradle/init.d/disable-lint.gradle << 'GRADLE'
          allprojects {
              afterEvaluate {
                  tasks.matching { it.name.startsWith("lintVital") }.configureEach {
                      enabled = false
                  }
              }
          }
          GRADLE

      - name: Build Release APK (standalone, no dev server)
        run: |
          cd android
          ./gradlew assembleRelease \
            -PabiFilters=arm64-v8a \
            -Pandroid.injected.signing.store.file=$(pwd)/../signing.keystore \
            -Pandroid.injected.signing.store.password=happynext123 \
            -Pandroid.injected.signing.key.alias=happynext \
            -Pandroid.injected.signing.key.password=happynext123 \
            --no-daemon

      - name: Locate APK
        id: find_apk
        run: |
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "Found APK: $APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: happy-next-release-${{ github.sha }}
          path: packages/happy-app/${{ steps.find_apk.outputs.apk_path }}
          retention-days: 7
